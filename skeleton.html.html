<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SkeletonCam — 骨格抽出ツール</title>
<style>
  :root{
    --bg:#0b0b10; --panel:#15151d; --panel2:#1c1c26; --line:#2a2a38;
    --text:#e8e8f0; --dim:#8a8a9c; --accent:#39d98a; --danger:#ff5c7a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:15px;line-height:1.6;padding-bottom:60px;
  }
  header{padding:22px 18px 14px;border-bottom:1px solid var(--line)}
  header h1{font-size:20px;font-weight:800}
  header h1 .grad{
    background:linear-gradient(90deg,#ff5c5c,#ffb13d,#ffe83d,#6dff6d,#4ad9ff,#7a7aff,#e07aff);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  header p{color:var(--dim);font-size:12px;margin-top:2px}
  .step{margin:14px 12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .step-head{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line)}
  .badge{width:26px;height:26px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#0b0b10}
  .b1{background:#ff8c5c}.b2{background:#ffe83d}
  .step-head h2{font-size:15px;font-weight:700}
  .step-head small{color:var(--dim);font-weight:400;display:block;font-size:11px}
  .step-body{padding:14px}
  .filebtn{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--line);border-radius:12px;padding:22px 12px;color:var(--dim);font-size:14px;background:var(--panel2);width:100%}
  input[type=file]{display:none}
  video,canvas.preview{width:100%;border-radius:10px;background:#000;display:block}
  .row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  label.opt{font-size:13px;color:var(--dim)}
  select{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:14px;-webkit-appearance:none;appearance:none}
  button.act{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;margin-top:12px;background:var(--accent);color:#052e1c}
  button.act:disabled{background:var(--line);color:var(--dim)}
  button.ghost{width:100%;padding:12px;border-radius:10px;margin-top:8px;background:transparent;border:1px solid var(--line);color:var(--text);font-size:14px}
  button.ghost:disabled{color:var(--dim)}
  .progress{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-top:12px;display:none}
  .progress .bar{height:100%;width:0%;background:linear-gradient(90deg,#ff5c5c,#ffb13d,#ffe83d,#6dff6d,#4ad9ff,#7a7aff);transition:width .15s}
  .status{font-size:12px;color:var(--dim);margin-top:6px;min-height:16px}
  .status.err{color:var(--danger)}
  .status.ok{color:var(--accent)}
  .hidden{display:none !important}
  .mt{margin-top:12px}
  footer{text-align:center;color:var(--dim);font-size:11px;padding:18px}
</style>
</head>
<body>

<header>
  <h1>Skeleton<span class="grad">Cam</span></h1>
  <p>動画から骨格を抽出して保存 — 完全ブラウザ処理・無料</p>
</header>

<!-- STEP 1 -->
<section class="step">
  <div class="step-head">
    <div class="badge b1">1</div>
    <h2>動画を選ぶ<small>カメラロールから選択</small></h2>
  </div>
  <div class="step-body">
    <label class="filebtn">
      🎬 動画を選択
      <input type="file" id="videoInput" accept="video/*">
    </label>
    <video id="srcVideo" class="hidden mt" playsinline muted controls></video>
    <div class="status" id="videoStatus"></div>
  </div>
</section>

<!-- STEP 2 -->
<section class="step">
  <div class="step-head">
    <div class="badge b2">2</div>
    <h2>骨格を抽出して保存<small>体・手指・顔のDWPose風スケルトン</small></h2>
  </div>
  <div class="step-body">
    <div class="row">
      <label class="opt">描画モード</label>
      <select id="modeSel">
        <option value="black" selected>骨格のみ（黒背景）</option>
        <option value="overlay">元動画に重ねる</option>
      </select>
    </div>
    <div class="row">
      <label class="opt">フレームレート</label>
      <select id="fpsSel">
        <option value="12">12 fps（軽い）</option>
        <option value="15" selected>15 fps（推奨）</option>
        <option value="24">24 fps（滑らか）</option>
      </select>
    </div>
    <div class="row">
      <label class="opt">最大処理時間</label>
      <select id="maxSec">
        <option value="10" selected>10秒</option>
        <option value="15">15秒</option>
        <option value="30">30秒</option>
        <option value="60">60秒</option>
      </select>
    </div>
    <button class="act" id="extractBtn" disabled>骨格抽出をスタート</button>
    <div class="progress" id="prog"><div class="bar" id="progBar"></div></div>
    <div class="status" id="extractStatus"></div>
    <canvas id="skelCanvas" class="preview hidden mt"></canvas>
    <video id="skelVideo" class="hidden mt" playsinline muted loop controls></video>
    <button class="ghost hidden" id="saveBtn">📥 カメラロールに保存</button>
  </div>
</section>

<footer>SkeletonCam v1.0 — MediaPipe Holistic（データは端末外に送信されません）</footer>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5/holistic.js"></script>
<script>
"use strict";
const $ = id => document.getElementById(id);
const srcVideo = $("srcVideo"), skelCanvas = $("skelCanvas"), skelVideo = $("skelVideo");
let videoFile = null, skeletonBlob = null, savedFile = null;

/* ============ STEP1: 動画選択 ============ */
$("videoInput").addEventListener("change", e => {
  const f = e.target.files[0];
  if(!f) return;
  videoFile = f;
  srcVideo.src = URL.createObjectURL(f);
  srcVideo.classList.remove("hidden");
  srcVideo.onloadedmetadata = () => {
    $("videoStatus").textContent =
      `${srcVideo.videoWidth}×${srcVideo.videoHeight} / ${srcVideo.duration.toFixed(1)}秒`;
    $("extractBtn").disabled = false;
  };
});

/* ============ DWPose風 描画定義 ============ */
const POSE_COLORS = [
  [255,0,0],[255,85,0],[255,170,0],[255,255,0],[170,255,0],[85,255,0],
  [0,255,0],[0,255,85],[0,255,170],[0,255,255],[0,170,255],[0,85,255],
  [0,0,255],[85,0,255],[170,0,255],[255,0,255],[255,0,170],[255,0,85]
];
const POSE_LIMBS = [
  [1,2],[1,5],[2,3],[3,4],[5,6],[6,7],[1,8],[8,9],[9,10],
  [1,11],[11,12],[12,13],[1,0],[0,14],[14,16],[0,15],[15,17]
];
const MP2OP = [0,-1,12,14,16,11,13,15,24,26,28,23,25,27,5,2,8,7];
const HAND_EDGES = [
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]
];
const FACE_PTS = [
  10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,
  148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109,
  61,146,91,181,84,17,314,405,321,375,291,409,270,269,267,0,37,39,40,185,
  263,249,390,373,374,380,381,382,362,398,384,385,386,387,388,466,
  33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246,
  276,283,282,295,285,300,293,334,296,
  46,53,52,65,55,70,63,105,66
];

function drawSkeleton(ctx, res, w, h, overlay, videoEl){
  if(overlay){
    ctx.drawImage(videoEl, 0, 0, w, h);
    /* 少し暗くして骨格を見やすく */
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,w,h);
  }else{
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,w,h);
  }

  const lm = res.poseLandmarks;
  if(lm){
    const pts = MP2OP.map((mi,oi) => {
      if(oi === 1){
        const a = lm[11], b = lm[12];
        if(a && b && a.visibility > .3 && b.visibility > .3)
          return {x:(a.x+b.x)/2*w, y:(a.y+b.y)/2*h};
        return null;
      }
      const p = lm[mi];
      return (p && p.visibility > .3) ? {x:p.x*w, y:p.y*h} : null;
    });
    const lw = Math.max(3, w/130);
    POSE_LIMBS.forEach((lim,i) => {
      const a = pts[lim[0]], b = pts[lim[1]];
      if(!a || !b) return;
      const c = POSE_COLORS[i % POSE_COLORS.length];
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
      const len=Math.hypot(b.x-a.x,b.y-a.y), ang=Math.atan2(b.y-a.y,b.x-a.x);
      ctx.save();
      ctx.translate(mx,my); ctx.rotate(ang);
      ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.6)`;
      ctx.beginPath();
      ctx.ellipse(0,0,len/2,lw,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    pts.forEach((p,i) => {
      if(!p) return;
      const c = POSE_COLORS[i % POSE_COLORS.length];
      ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
      ctx.beginPath();
      ctx.arc(p.x,p.y,lw*1.1,0,Math.PI*2);
      ctx.fill();
    });
  }

  [res.leftHandLandmarks, res.rightHandLandmarks].forEach(hand => {
    if(!hand) return;
    const lw = Math.max(2, w/220);
    HAND_EDGES.forEach((e,i) => {
      const a = hand[e[0]], b = hand[e[1]];
      if(!a || !b) return;
      ctx.strokeStyle = `hsl(${i/20*360},100%,50%)`;
      ctx.lineWidth = lw;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(a.x*w, a.y*h);
      ctx.lineTo(b.x*w, b.y*h);
      ctx.stroke();
    });
    hand.forEach(p => {
      ctx.fillStyle = "rgb(0,0,255)";
      ctx.beginPath();
      ctx.arc(p.x*w, p.y*h, lw*1.2, 0, Math.PI*2);
      ctx.fill();
    });
  });

  if(res.faceLandmarks){
    ctx.fillStyle = "#fff";
    const r = Math.max(1.2, w/400);
    FACE_PTS.forEach(i => {
      const p = res.faceLandmarks[i];
      if(!p) return;
      ctx.beginPath();
      ctx.arc(p.x*w, p.y*h, r, 0, Math.PI*2);
      ctx.fill();
    });
  }
}

/* ============ 抽出処理 ============ */
let holistic = null, resultResolver = null;

function initHolistic(){
  if(holistic) return holistic;
  holistic = new Holistic({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5/${f}`
  });
  holistic.setOptions({
    modelComplexity: 1, smoothLandmarks: true, refineFaceLandmarks: false,
    minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
  });
  holistic.onResults(r => { if(resultResolver){ resultResolver(r); resultResolver = null; } });
  return holistic;
}

function seekTo(video, t){
  return new Promise(res => {
    const h = () => { video.removeEventListener("seeked", h); res(); };
    video.addEventListener("seeked", h);
    video.currentTime = t;
  });
}
function processFrame(video){
  return new Promise(res => { resultResolver = res; holistic.send({image: video}); });
}

$("extractBtn").addEventListener("click", async () => {
  if(!videoFile) return;
  const btn = $("extractBtn"), st = $("extractStatus");
  btn.disabled = true;
  st.className = "status";
  st.textContent = "モデルを読み込み中…（初回は少し時間がかかります）";

  try{
    initHolistic();
    const fps = parseInt($("fpsSel").value);
    const maxSec = parseInt($("maxSec").value);
    const overlay = $("modeSel").value === "overlay";
    const dur = Math.min(srcVideo.duration, maxSec);
    const total = Math.floor(dur * fps);

    const vw = srcVideo.videoWidth, vh = srcVideo.videoHeight;
    const scale = Math.min(1, 768 / Math.max(vw, vh));
    const outW = Math.round(vw * scale / 2) * 2;
    const outH = Math.round(vh * scale / 2) * 2;
    skelCanvas.width = outW;
    skelCanvas.height = outH;
    skelCanvas.classList.remove("hidden");
    const ctx = skelCanvas.getContext("2d");

    $("prog").style.display = "block";
    const frames = [];
    skelVideo.classList.add("hidden");
    $("saveBtn").classList.add("hidden");
    savedFile = null;
    srcVideo.pause();

    for(let i = 0; i < total; i++){
      await seekTo(srcVideo, i / fps);
      const res = await processFrame(srcVideo);
      drawSkeleton(ctx, res, outW, outH, overlay, srcVideo);
      const blob = await new Promise(r => skelCanvas.toBlob(r, "image/jpeg", 0.85));
      frames.push(blob);
      $("progBar").style.width = `${((i+1)/total*100).toFixed(1)}%`;
      st.textContent = `解析中… ${i+1} / ${total} フレーム`;
    }

    st.textContent = "動画を書き出し中…";
    skeletonBlob = await encodeFramesToVideo(frames, fps, outW, outH, st);
    skelVideo.src = URL.createObjectURL(skeletonBlob);
    skelVideo.classList.remove("hidden");
    skelVideo.play().catch(()=>{});
    skelCanvas.classList.add("hidden");
    $("saveBtn").classList.remove("hidden");
    $("saveBtn").textContent = "📥 カメラロールに保存";
    st.className = "status ok";
    st.textContent = `✅ 完了！ ${frames.length}フレーム / ${fps}fps / ${outW}×${outH}`;
  }catch(err){
    st.className = "status err";
    st.textContent = "エラー: " + err.message;
  }finally{
    btn.disabled = false;
    $("prog").style.display = "none";
  }
});

async function encodeFramesToVideo(frameBlobs, fps, w, h, st){
  const cv = document.createElement("canvas");
  cv.width = w; cv.height = h;
  const ctx = cv.getContext("2d");
  const stream = cv.captureStream(fps);
  const mime = ["video/mp4;codecs=avc1", "video/mp4", "video/webm;codecs=vp9", "video/webm"]
    .find(m => MediaRecorder.isTypeSupported(m));
  if(!mime) throw new Error("この端末は動画書き出しに未対応です");

  const rec = new MediaRecorder(stream, {mimeType: mime, videoBitsPerSecond: 4_000_000});
  const chunks = [];
  rec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
  const done = new Promise(r => rec.onstop = r);
  rec.start();

  const interval = 1000 / fps;
  for(let i = 0; i < frameBlobs.length; i++){
    const bmp = await createImageBitmap(frameBlobs[i]);
    const t0 = performance.now();
    ctx.drawImage(bmp, 0, 0, w, h);
    bmp.close();
    if(st) st.textContent = `書き出し中… ${i+1} / ${frameBlobs.length}`;
    const wait = interval - (performance.now() - t0);
    if(wait > 0) await new Promise(r => setTimeout(r, wait));
  }
  await new Promise(r => setTimeout(r, 300));
  rec.stop();
  await done;
  return new Blob(chunks, {type: mime.split(";")[0]});
}

/* ============ カメラロール保存 ============ */
$("saveBtn").addEventListener("click", async () => {
  const btn = $("saveBtn");
  /* 2回目タップ: 共有シートで保存 */
  if(savedFile){
    try{ await navigator.share({files:[savedFile]}); }catch(e){}
    return;
  }
  if(!skeletonBlob) return;
  const ext = skeletonBlob.type.includes("mp4") ? "mp4" : "webm";
  const file = new File([skeletonBlob], "skeleton." + ext, {type: skeletonBlob.type});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    savedFile = file;
    btn.textContent = "✅ 準備OK！もう一度タップ → 「ビデオを保存」";
  }else{
    const a = document.createElement("a");
    a.href = URL.createObjectURL(skeletonBlob);
    a.download = "skeleton." + ext;
    a.click();
  }
});
</script>
</body>
</html>
